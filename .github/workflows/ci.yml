name: Continuous Integration

on:

  push:
    branches: [ "main", "develop", "feat/*", "bug/*", "security/*", "hotfix/*", "claude/*" ]
    paths-ignore:
      - '**.md'
      - '.github/skills/**'
      - '.github/copilot-instructions.md'
      - 'LICENSE'

  pull_request:
    branches: [ "main", "develop", "feat/*", "bug/*", "security/*", "hotfix/*", "claude/*" ]
    paths-ignore:
      - '**.md'
      - '.github/skills/**'
      - '.github/copilot-instructions.md'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: ""

# Minimal permissions by default; specific jobs can elevate
permissions:
  contents: read

jobs:

  # Test jobs - Rust + NPM suites via matrix
  test:
    name: Test - ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Rust (Ubuntu)
            suite: rust
            os: ubuntu-latest
          - name: Go (Ubuntu)
            suite: go
            os: ubuntu-latest
          - name: NPM (Node 18)
            suite: npm
            os: ubuntu-latest
            node: 18
          - name: NPM (Node 20)
            suite: npm
            os: ubuntu-latest
            node: 20
    steps:
    - uses: actions/checkout@v5

    # Rust code quality + tests
    - name: Install Rust toolchain
      if: ${{ matrix.suite == 'rust' }}
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo dependencies
      if: ${{ matrix.suite == 'rust' }}
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: cargo-${{ runner.os }}-

    - name: Check formatting
      if: ${{ matrix.suite == 'rust' }}
      run: cargo fmt --all -- --check

    - name: Check clippy
      if: ${{ matrix.suite == 'rust' }}
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Build tests
      if: ${{ matrix.suite == 'rust' }}
      run: cargo build --tests --locked

    - name: Run Rust tests
      if: ${{ matrix.suite == 'rust' }}
      run: cargo test --locked --verbose

    - name: Generate test coverage report
      if: ${{ matrix.suite == 'rust' }}
      run: |
        # Install cargo-tarpaulin for coverage if not cached
        if ! command -v cargo-tarpaulin &> /dev/null; then
          cargo install cargo-tarpaulin
        fi
        # Generate coverage report (xml for upload, stdout for logs)
        cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out Xml --out Stdout 2>&1 | head -100 || true
      continue-on-error: true

    # Go code quality + tests
    - name: Setup Go
      if: ${{ matrix.suite == 'go' }}
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.x'
        cache-dependency-path: adk/go.sum

    - name: Download Go dependencies
      if: ${{ matrix.suite == 'go' }}
      run: |
        cd adk
        go mod download

    - name: Check Go formatting
      if: ${{ matrix.suite == 'go' }}
      run: |
        cd adk
        if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
          echo "Go code is not formatted properly! Run 'gofmt -w .' locally."
          gofmt -l .
          exit 1
        fi

    - name: Run Go tests
      if: ${{ matrix.suite == 'go' }}
      run: |
        cd adk
        go test -v ./...

    # NPM package tests (build the Rust binary first)
    - name: Install Rust toolchain (for npm build)
      if: ${{ matrix.suite == 'npm' }}
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo dependencies
      if: ${{ matrix.suite == 'npm' }}
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: cargo-${{ runner.os }}-

    - name: Build release binary
      if: ${{ matrix.suite == 'npm' }}
      run: cargo build --locked --release

    - name: Setup Node.js
      if: ${{ matrix.suite == 'npm' }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node }}

    - name: Verify lockfile is in sync
      if: ${{ matrix.suite == 'npm' }}
      run: |
        cd npm/terminal-jarvis
        # Check if package-lock.json is in sync with package.json
        # Note: npm may modify lockfile due to platform-specific optional deps
        npm install --package-lock-only
        if ! git diff --quiet package-lock.json; then
          echo "::warning::package-lock.json has changes (may be due to platform-specific optional dependencies)"
          git diff package-lock.json | head -20
        fi

    - name: Install dependencies
      if: ${{ matrix.suite == 'npm' }}
      run: |
        cd npm/terminal-jarvis
        npm ci

    - name: Build TypeScript
      if: ${{ matrix.suite == 'npm' }}
      run: |
        cd npm/terminal-jarvis
        npm run build

    - name: Lint NPM Package
      if: ${{ matrix.suite == 'npm' }}
      run: |
        cd npm/terminal-jarvis
        npm run lint

    - name: Ensure jq is installed
      if: ${{ matrix.suite == 'npm' }}
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: NPM Audit (moderate severity)
      if: ${{ matrix.suite == 'npm' }}
      run: |
        cd npm/terminal-jarvis
        npm audit --audit-level=moderate --json | jq '.' > npm-audit.json || true
        # Fail build if moderate/high/critical vulnerabilities are present
        MODERATE=$(jq '.metadata.vulnerabilities.moderate // 0' npm-audit.json); \
        HIGH=$(jq '.metadata.vulnerabilities.high // 0' npm-audit.json); \
        CRIT=$(jq '.metadata.vulnerabilities.critical // 0' npm-audit.json); \
        echo "Moderate: $MODERATE, High: $HIGH, Critical: $CRIT"; \
        [ $((MODERATE+HIGH+CRIT)) -eq 0 ]

  # Security - Rust dependency checks (cargo-audit + cargo-deny in one runner)
  security-rust:
    name: Security - Rust
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo dependencies and tools
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ~/.cargo/bin/cargo-audit
        key: cargo-security-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: cargo-security-${{ runner.os }}-

    - name: Install dependencies for cargo-audit
      run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

    - name: Install cargo-audit
      run: |
        if ! command -v cargo-audit &> /dev/null; then
          cargo install cargo-audit
        fi

    - name: Run cargo-audit
      # Ignored advisories:
      # - RUSTSEC-2025-0134 / RUSTSEC-2025-0141: unmaintained crates in libsql's dep tree (transitive, not actionable)
      # - RUSTSEC-2024-0375 / RUSTSEC-2021-0145: historical advisories for dependencies already at latest compatible versions
      # - RUSTSEC-2026-0037 / RUSTSEC-2026-0049 / RUSTSEC-2026-0098 / RUSTSEC-2026-0099 / RUSTSEC-2026-0104:
      #   rustls-webpki and quinn-proto issues in libsql/reqwest transitive deps; fixed where possible via cargo update,
      #   remaining rustls-webpki 0.102.8 issues blocked on libsql upgrading from rustls 0.22
      # - RUSTSEC-2026-0097: rand unsoundness fixed by updating to rand 0.8.6 / 0.9.4
      run: cargo audit --deny warnings --ignore RUSTSEC-2025-0134 --ignore RUSTSEC-2025-0141 --ignore RUSTSEC-2024-0375 --ignore RUSTSEC-2021-0145 --ignore RUSTSEC-2026-0049 --ignore RUSTSEC-2026-0037 --ignore RUSTSEC-2026-0098 --ignore RUSTSEC-2026-0099 --ignore RUSTSEC-2026-0104

    - name: Run cargo-deny checks
      uses: EmbarkStudios/cargo-deny-action@v2
      with:
        command: check advisories bans sources

  # Security - General checks (gitleaks, shellcheck, SBOM - no Rust needed)
  security-general:
    name: Security - General
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    # Allow PRs to surface SBOM findings without blocking; block on main by required checks
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
    - uses: actions/checkout@v5

    # Gitleaks secrets scan
    - name: Ensure full history for secrets scan
      run: |
        git fetch --prune --unshallow || true

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ShellCheck
    - name: Install ShellCheck
      run: sudo apt-get update && sudo apt-get install -y shellcheck

    - name: Run ShellCheck
      run: |
        set -e
        if [ -d scripts ]; then
          find scripts -type f -name "*.sh" -print0 | xargs -0 -r shellcheck -S style -x
        fi

    # SBOM and vulnerability scan (Anchore)
    - name: Scan workspace with Anchore
      id: anchore
      uses: anchore/scan-action@v4
      with:
        path: .
        fail-build: false
        severity-cutoff: critical
        output-format: sarif

    - name: Check scan results
      run: |
        if [ -f results.sarif ]; then
          echo "Scan complete. Review SARIF output for details."
          # SARIF upload disabled due to parsing issues - review artifacts manually
        fi
