name: CI

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: npm/terminal-jarvis/package-lock.json

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/bin/cargo-deny
            ~/.cargo/bin/cargo-llvm-cov
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-verify-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-v1
          restore-keys: cargo-verify-${{ runner.os }}-

      - name: Install CI cargo tools
        run: |
          command -v cargo-audit >/dev/null || cargo install cargo-audit --locked
          command -v cargo-deny >/dev/null || cargo install cargo-deny --locked
          command -v cargo-llvm-cov >/dev/null || cargo install cargo-llvm-cov --locked

      - name: Run branch verification
        run: scripts/verify.sh
        env:
          TJ_REQUIRE_SECURITY_TOOLS: "1"

  package:
    name: Package Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: npm/terminal-jarvis/package-lock.json

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-package-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-v1
          restore-keys: cargo-package-${{ runner.os }}-

      - name: Build release package
        run: scripts/package-release.sh

      - uses: actions/upload-artifact@v7
        with:
          name: package-smoke-linux
          path: dist/**
          retention-days: 7

  mutation:
    name: Mutation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/cargo-mutants
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-mutation-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-v1
          restore-keys: cargo-mutation-${{ runner.os }}-

      - name: Install cargo-mutants
        run: command -v cargo-mutants >/dev/null || cargo install cargo-mutants --locked

      - name: Run mutation tests
        run: cargo mutants --config mutants.toml --minimum-test-timeout 30 --jobs 2
