name: Multi-Platform CD

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create or update, such as v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  package:
    name: Package - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64-gnu
            os: ubuntu-latest
          - platform: macos-x64
            os: macos-15-intel
          - platform: macos-arm64
            os: macos-15
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: npm/terminal-jarvis/package-lock.json

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-cd-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-v1
          restore-keys: cargo-cd-${{ runner.os }}-

      - name: Build package
        run: scripts/package-release.sh

      - name: Verify platform package shape
        run: |
          set -eu
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          archive="dist/$version/${{ matrix.platform }}/terminal-jarvis-$version-${{ matrix.platform }}.tar.gz"
          test -f "$archive"
          test -f "$archive.sha256"
          test -f "dist/$version/${{ matrix.platform }}/homebrew/Formula/terminal-jarvis.rb"

      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform }}
          path: dist/**
          retention-days: 7

  release:
    name: Draft GitHub Release
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish draft release assets
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -eu
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="$INPUT_VERSION"
          fi
          case "$tag" in
            v*) ;;
            *) echo "release tag must start with v: $tag" >&2; exit 1 ;;
          esac
          version="${tag#v}"

          mkdir -p release-assets
          find artifacts -type f \( -name "terminal-jarvis-*.tar.gz" -o -name "*.sha256" \) \
            -exec cp {} release-assets/ \;
          platforms="$(
            sed -n 's/^release_platforms = \[\(.*\)\]/\1/p' scripts/release.toml |
              tr ',' '\n' |
              tr -d ' "'
          )"
          test -n "$platforms"
          for platform in $platforms; do
            archive="terminal-jarvis-$version-$platform.tar.gz"
            test -f "release-assets/$archive"
            test -f "release-assets/$archive.sha256"
            expected="$(cut -d ' ' -f 1 "release-assets/$archive.sha256")"
            recorded="$(awk '{print $2}' "release-assets/$archive.sha256")"
            actual="$(sha256sum "release-assets/$archive" | cut -d ' ' -f 1)"
            case "$recorded" in
              "$archive" | "./$archive") ;;
              *) echo "release-assets/$archive.sha256 references $recorded, expected $archive" >&2; exit 1 ;;
            esac
            test "$expected" = "$actual"
          done

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" release-assets/* \
              --draft \
              --title "$tag" \
              --notes "Draft $tag harness catalog release assets."
          fi
