name: Bug Report
description: Report a reproducible problem in Terminal Jarvis
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for maintainers to reproduce the behavior.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact commands or menu choices that trigger the problem.
      placeholder: |
        1. Run `terminal-jarvis ...`
        2. Select ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Terminal Jarvis version
      placeholder: "terminal-jarvis --version"
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - npm
        - cargo
        - Homebrew
        - source checkout
        - other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS and shell
      placeholder: "Ubuntu 24.04, macOS 15, Windows 11, Termux, bash, zsh, PowerShell"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste logs, stack traces, or screenshots if they help explain the issue.
      render: shell
